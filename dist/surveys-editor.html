<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow">
  <title>Editor de Encuestas | Admin</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    :root {
      --primary:#1B3B5A; --teal:#5D9CB5; --teal-light:#8ec5d6;
      --bg:#f0f4f8; --white:#fff; --border:#e2e8f0;
      --text:#1e293b; --muted:#64748b;
      --radius:12px; --radius-lg:18px;
      --shadow:0 4px 20px rgba(0,0,0,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Top bar ── */
    .top-bar{background:var(--primary);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
    .top-bar a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:.4rem}
    .top-bar a:hover{color:#fff}
    .top-bar h1{font-family:'Outfit',sans-serif;font-size:1.3rem;color:#fff;margin-left:auto;margin-right:auto}

    /* ── Layout ── */
    .layout{display:grid;grid-template-columns:320px 1fr;gap:1.5rem;padding:1.5rem;max-width:1300px;margin:0 auto}
    @media(max-width:900px){.layout{grid-template-columns:1fr}}

    /* ── Cards ── */
    .card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
    .card-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#f8fafc,var(--white))}
    .card-header h2{font-family:'Outfit',sans-serif;font-size:1rem;color:var(--primary)}
    .card-body{padding:1.5rem}

    /* ── Survey list ── */
    .survey-item{display:flex;align-items:center;padding:.85rem 1rem;border-radius:10px;cursor:pointer;gap:.8rem;transition:background .2s;border:2px solid transparent;margin-bottom:.4rem}
    .survey-item:hover{background:#f0f4f8}
    .survey-item.active{background:rgba(93,156,181,.1);border-color:var(--teal)}
    .survey-item-title{flex:1;font-weight:600;font-size:.9rem;color:var(--primary)}
    .survey-item-count{font-size:.75rem;color:var(--muted);background:#f0f4f8;padding:.2rem .55rem;border-radius:20px}
    .btn-icon-sm{background:none;border:none;cursor:pointer;padding:.3rem;border-radius:6px;color:var(--muted);transition:all .2s;font-size:.95rem}
    .btn-icon-sm:hover{background:#fee2e2;color:#dc2626}
    .btn-icon-sm.edit:hover{background:rgba(93,156,181,.15);color:var(--teal)}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:all .2s;font-family:'Inter',sans-serif}
    .btn-primary{background:linear-gradient(135deg,var(--teal),var(--primary));color:#fff}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-outline{background:none;border:1.5px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--teal);color:var(--teal)}
    .btn-danger{background:#fee2e2;color:#dc2626;border:none}
    .btn-danger:hover{background:#fecaca}
    .btn-sm{padding:.4rem .85rem;font-size:.8rem}

    /* ── Form ── */
    .form-group{margin-bottom:1.1rem}
    .form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--primary);margin-bottom:.4rem}
    .form-control{width:100%;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:10px;font-size:.88rem;font-family:'Inter',sans-serif;transition:border-color .2s;color:var(--text)}
    .form-control:focus{outline:none;border-color:var(--teal)}

    /* ── Questions ── */
    .question-row{background:#f8fafc;border:1.5px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:.75rem;position:relative}
    .question-row.dragging{opacity:.5}
    .question-header{display:flex;align-items:flex-start;gap:.8rem}
    .q-num{background:var(--primary);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:.15rem}
    .q-text{flex:1;font-weight:600;font-size:.88rem;color:var(--primary);line-height:1.4}
    .q-type-badge{font-size:.7rem;padding:.2rem .5rem;border-radius:20px;background:rgba(93,156,181,.15);color:var(--teal);font-weight:600;white-space:nowrap}
    .q-options{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.7rem}
    .q-option{background:#e2e8f0;padding:.2rem .55rem;border-radius:20px;font-size:.75rem;color:var(--muted)}
    .q-actions{display:flex;gap:.3rem;flex-shrink:0}
    .drag-handle{cursor:grab;color:#cbd5e1;font-size:1.1rem;margin-top:.2rem}

    /* ── Options builder ── */
    .option-row{display:flex;gap:.5rem;margin-bottom:.4rem;align-items:center}
    .option-row input{flex:1}
    .option-row button{background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:.4rem .6rem;cursor:pointer;font-size:.8rem}

    /* ── Msg ── */
    .msg{padding:.65rem 1rem;border-radius:10px;font-size:.85rem;font-weight:500;display:none;margin-bottom:1rem}
    .msg.show{display:block}
    .msg-ok{background:#d1fae5;color:#065f46}
    .msg-err{background:#fee2e2;color:#dc2626}

    /* ── Empty ── */
    .empty{text-align:center;padding:3rem;color:var(--muted)}
    .empty svg{display:block;margin:0 auto 1rem;opacity:.3}

    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)}
    .modal h3{font-family:'Outfit',sans-serif;color:var(--primary);margin-bottom:1.5rem}
    .modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}
  </style>
  <link rel="stylesheet" crossorigin href="/assets/style-CLZfG7fx.css">
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <a href="/admin.html">← Volver al Admin</a>
  <h1>📋 Editor de Encuestas</h1>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Columna izquierda: lista encuestas -->
  <div>
    <div class="card">
      <div class="card-header">
        <h2>Encuestas</h2>
        <button class="btn btn-primary btn-sm" onclick="openNewSurveyModal()">+ Nueva</button>
      </div>
      <div class="card-body" style="padding:.75rem">
        <div id="surveyList"><p class="empty">Cargando...</p></div>
      </div>
    </div>
  </div>

  <!-- Columna derecha: editor preguntas -->
  <div id="rightPanel">
    <div class="card">
      <div class="card-body">
        <div class="empty" style="padding:4rem">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
          <p>Selecciona una encuesta para ver y gestionar sus preguntas</p>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Modal: nueva/editar encuesta -->
<div class="modal-overlay" id="surveyModal">
  <div class="modal">
    <h3 id="surveyModalTitle">Nueva Encuesta</h3>
    <div id="msgSurvey" class="msg"></div>
    <input type="hidden" id="editSurveyId">
    <div class="form-group">
      <label>Título *</label>
      <input class="form-control" id="surveyTitleInput" placeholder="Ej: Diagnóstico de Prospección 2026">
    </div>
    <div class="form-group">
      <label>Descripción (opcional)</label>
      <textarea class="form-control" id="surveyDescInput" rows="2" placeholder="Breve descripción de la encuesta"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSurveyModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSurvey()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: nueva/editar pregunta -->
<div class="modal-overlay" id="questionModal">
  <div class="modal">
    <h3 id="qModalTitle">Nueva Pregunta</h3>
    <div id="msgQ" class="msg"></div>
    <input type="hidden" id="editQId">
    <input type="hidden" id="editQOrder">
    <div class="form-group">
      <label>Texto de la pregunta *</label>
      <textarea class="form-control" id="qText" rows="2" placeholder="¿Cuál es tu mayor reto en prospección?"></textarea>
    </div>
    <div class="form-group">
      <label>Tipo de respuesta</label>
      <select class="form-control" id="qType" onchange="toggleOptions()">
        <option value="radio">Opción única (radio)</option>
        <option value="checkbox">Múltiple opción (checkbox)</option>
        <option value="text">Texto libre</option>
        <option value="scale">Escala 1-10</option>
      </select>
    </div>
    <div class="form-group">
      <label>Categoría (opcional)</label>
      <input class="form-control" id="qCategory" placeholder="Ej: Habilidades, Herramientas...">
    </div>
    <div id="optionsSection" class="form-group">
      <label>Opciones de respuesta</label>
      <div id="optionsList"></div>
      <button class="btn btn-outline btn-sm" onclick="addOption()" style="margin-top:.5rem">+ Añadir opción</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeQModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveQuestion()">💾 Guardar pregunta</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://prospectaexistov2-production.up.railway.app/api';
  const token = localStorage.getItem('pce_token');
  const authH = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${token}` });

  let surveys = [];
  let currentSurvey = null;

  // ── Guard (server-side verification) ──
  if (!token) { window.location.href = '/login.html'; }

  async function checkAuth() {
    try {
      const res = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error();
      const me = await res.json();
      if (me.role !== 'admin' && me.role !== 'superadmin') {
        window.location.href = '/login.html';
      }
    } catch {
      window.location.href = '/login.html';
    }
  }

  // ── Load surveys ──
  async function loadSurveys() {
    const res = await fetch(`${API}/surveys`);
    surveys = await res.json();
    const list = document.getElementById('surveyList');
    list.innerHTML = '';
    if (!surveys.length) {
      const p = document.createElement('p');
      p.style.textAlign = 'center';
      p.style.color = 'var(--muted)';
      p.style.padding = '1rem';
      p.style.fontSize = '.85rem';
      p.textContent = 'No hay encuestas. Crea la primera.';
      list.appendChild(p);
      return;
    }
    surveys.forEach(s => {
      const item = document.createElement('div');
      item.className = `survey-item ${currentSurvey?.id === s.id ? 'active' : ''}`;
      item.onclick = () => selectSurvey(s.id);

      const span = document.createElement('span');
      span.className = 'survey-item-title';
      span.textContent = s.title;

      const editBtn = document.createElement('button');
      editBtn.className = 'btn-icon-sm edit';
      editBtn.title = 'Editar';
      editBtn.textContent = '✏️';
      editBtn.onclick = (e) => {
        e.stopPropagation();
        openEditSurveyModal(s.id);
      };

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon-sm';
      delBtn.title = 'Eliminar';
      delBtn.textContent = '🗑';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        deleteSurvey(s.id);
      };

      item.appendChild(span);
      item.appendChild(editBtn);
      item.appendChild(delBtn);
      list.appendChild(item);
    });
  }

  async function selectSurvey(id) {
    const res = await fetch(`${API}/surveys/${id}`);
    currentSurvey = await res.json();
    renderEditor();
    document.querySelectorAll('.survey-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.survey-item').forEach(el => {
      if (el.textContent.includes(currentSurvey.title)) el.classList.add('active');
    });
  }

  function renderEditor() {
    const s = currentSurvey;
    const rightPanel = document.getElementById('rightPanel');
    rightPanel.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'card';

    const cardHeader = document.createElement('div');
    cardHeader.className = 'card-header';

    const headerTextDiv = document.createElement('div');
    const h2 = document.createElement('h2');
    h2.textContent = `📋 ${s.title}`;
    headerTextDiv.appendChild(h2);

    if (s.description) {
      const p = document.createElement('p');
      p.style.fontSize = '.8rem';
      p.style.color = 'var(--muted)';
      p.style.marginTop = '.2rem';
      p.textContent = s.description;
      headerTextDiv.appendChild(p);
    }

    const addQBtn = document.createElement('button');
    addQBtn.className = 'btn btn-primary btn-sm';
    addQBtn.textContent = '+ Pregunta';
    addQBtn.onclick = openNewQModal;

    cardHeader.appendChild(headerTextDiv);
    cardHeader.appendChild(addQBtn);

    const cardBody = document.createElement('div');
    cardBody.className = 'card-body';

    const msgQList = document.createElement('div');
    msgQList.id = 'msgQList';
    msgQList.className = 'msg';
    cardBody.appendChild(msgQList);

    const questionsListDiv = document.createElement('div');
    questionsListDiv.id = 'questionsList';
    
    const questions = s.questions || [];
    if (!questions.length) {
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty';
      emptyDiv.innerHTML = `
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <p style="font-size:.88rem">Esta encuesta no tiene preguntas. Añade la primera.</p>
      `;
      questionsListDiv.appendChild(emptyDiv);
    } else {
      questions.forEach((q, i) => {
        const qRow = document.createElement('div');
        qRow.className = 'question-row';
        qRow.id = `qrow-${q.id}`;

        const qHeader = document.createElement('div');
        qHeader.className = 'question-header';

        const dragHandle = document.createElement('span');
        dragHandle.className = 'drag-handle';
        dragHandle.textContent = '⠿';

        const qNum = document.createElement('span');
        qNum.className = 'q-num';
        qNum.textContent = i + 1;

        const infoDiv = document.createElement('div');
        infoDiv.style.flex = '1';

        const qText = document.createElement('div');
        qText.className = 'q-text';
        qText.textContent = q.text;
        infoDiv.appendChild(qText);

        if (q.category) {
          const qCat = document.createElement('div');
          qCat.style.fontSize = '.75rem';
          qCat.style.color = 'var(--muted)';
          qCat.style.marginTop = '.2rem';
          qCat.textContent = `📁 ${q.category}`;
          infoDiv.appendChild(qCat);
        }

        if (q.options?.length) {
          const qOptsDiv = document.createElement('div');
          qOptsDiv.className = 'q-options';
          q.options.forEach(o => {
            const optSpan = document.createElement('span');
            optSpan.className = 'q-option';
            optSpan.textContent = o;
            qOptsDiv.appendChild(optSpan);
          });
          infoDiv.appendChild(qOptsDiv);
        }

        const qTypeBadge = document.createElement('span');
        qTypeBadge.className = 'q-type-badge';
        qTypeBadge.textContent = typeLabel(q.type);

        const qActions = document.createElement('div');
        qActions.className = 'q-actions';

        const editQBtn = document.createElement('button');
        editQBtn.className = 'btn-icon-sm edit';
        editQBtn.title = 'Editar';
        editQBtn.textContent = '✏️';
        editQBtn.onclick = () => openEditQModal(q.id);

        const delQBtn = document.createElement('button');
        delQBtn.className = 'btn-icon-sm';
        delQBtn.title = 'Eliminar';
        delQBtn.textContent = '🗑';
        delQBtn.onclick = () => deleteQuestion(q.id);

        qActions.appendChild(editQBtn);
        qActions.appendChild(delQBtn);

        qHeader.appendChild(dragHandle);
        qHeader.appendChild(qNum);
        qHeader.appendChild(infoDiv);
        qHeader.appendChild(qTypeBadge);
        qHeader.appendChild(qActions);

        qRow.appendChild(qHeader);
        questionsListDiv.appendChild(qRow);
      });
    }

    cardBody.appendChild(questionsListDiv);
    card.appendChild(cardHeader);
    card.appendChild(cardBody);
    rightPanel.appendChild(card);
  }

  function typeLabel(t) {
    return { radio: '🔘 Única', checkbox: '☑️ Múltiple', text: '✍️ Texto', scale: '📊 Escala' }[t] || t;
  }

  // ── Survey CRUD ──
  function openNewSurveyModal() {
    document.getElementById('surveyModalTitle').textContent = 'Nueva Encuesta';
    document.getElementById('editSurveyId').value = '';
    document.getElementById('surveyTitleInput').value = '';
    document.getElementById('surveyDescInput').value = '';
    showMsg('msgSurvey', '', '');
    document.getElementById('surveyModal').classList.add('open');
  }

  function openEditSurveyModal(id) {
    const s = surveys.find(x => x.id === id);
    if (!s) return;
    document.getElementById('surveyModalTitle').textContent = 'Editar Encuesta';
    document.getElementById('editSurveyId').value = id;
    document.getElementById('surveyTitleInput').value = s.title;
    document.getElementById('surveyDescInput').value = s.description || '';
    showMsg('msgSurvey', '', '');
    document.getElementById('surveyModal').classList.add('open');
  }

  function closeSurveyModal() { document.getElementById('surveyModal').classList.remove('open'); }

  async function saveSurvey() {
    const id = document.getElementById('editSurveyId').value;
    const title = document.getElementById('surveyTitleInput').value.trim();
    const description = document.getElementById('surveyDescInput').value.trim();
    if (!title) { showMsg('msgSurvey', 'El título es obligatorio', 'err'); return; }
    const method = id ? 'PUT' : 'POST';
    const url = id ? `${API}/admin/surveys/${id}` : `${API}/admin/surveys`;
    const res = await fetch(url, { method, headers: authH(), body: JSON.stringify({ title, description }) });
    const data = await res.json();
    if (!res.ok) { showMsg('msgSurvey', data.error, 'err'); return; }
    showMsg('msgSurvey', '✅ Guardado', 'ok');
    setTimeout(() => { closeSurveyModal(); loadSurveys(); if (id && currentSurvey?.id == id) selectSurvey(id); }, 700);
  }

  async function deleteSurvey(id) {
    const s = surveys.find(x => x.id === id);
    if (!confirm(`¿Eliminar la encuesta "${s?.title}"? Se eliminarán también todas sus preguntas.`)) return;
    await fetch(`${API}/admin/surveys/${id}`, { method: 'DELETE', headers: authH() });
    if (currentSurvey?.id === id) { currentSurvey = null; document.getElementById('rightPanel').innerHTML = '<div class="card"><div class="card-body"><div class="empty"><p>Selecciona una encuesta</p></div></div></div>'; }
    loadSurveys();
  }

  // ── Question CRUD ──
  function openNewQModal() {
    document.getElementById('qModalTitle').textContent = 'Nueva Pregunta';
    document.getElementById('editQId').value = '';
    document.getElementById('qText').value = '';
    document.getElementById('qType').value = 'radio';
    document.getElementById('qCategory').value = '';
    document.getElementById('optionsList').innerHTML = '';
    addOption(); addOption();
    toggleOptions();
    showMsg('msgQ', '', '');
    document.getElementById('questionModal').classList.add('open');
  }

  function openEditQModal(id) {
    const q = currentSurvey.questions.find(x => x.id === id);
    if (!q) return;
    document.getElementById('qModalTitle').textContent = 'Editar Pregunta';
    document.getElementById('editQId').value = id;
    document.getElementById('editQOrder').value = q.order_num;
    document.getElementById('qText').value = q.text;
    document.getElementById('qType').value = q.type;
    document.getElementById('qCategory').value = q.category || '';
    const ol = document.getElementById('optionsList');
    ol.innerHTML = '';
    (q.options || []).forEach(opt => addOption(opt));
    if (!(q.options || []).length) { addOption(); addOption(); }
    toggleOptions();
    showMsg('msgQ', '', '');
    document.getElementById('questionModal').classList.add('open');
  }

  function closeQModal() { document.getElementById('questionModal').classList.remove('open'); }

  function toggleOptions() {
    const t = document.getElementById('qType').value;
    document.getElementById('optionsSection').style.display = (t === 'radio' || t === 'checkbox') ? 'block' : 'none';
  }

  function addOption(val = '') {
    const div = document.createElement('div');
    div.className = 'option-row';

    const input = document.createElement('input');
    input.className = 'form-control';
    input.placeholder = 'Opción...';
    input.value = val;

    const btn = document.createElement('button');
    btn.textContent = '✕';
    btn.onclick = () => div.remove();

    div.appendChild(input);
    div.appendChild(btn);
    document.getElementById('optionsList').appendChild(div);
  }

  async function saveQuestion() {
    const id = document.getElementById('editQId').value;
    const text = document.getElementById('qText').value.trim();
    const type = document.getElementById('qType').value;
    const category = document.getElementById('qCategory').value.trim();
    const order_num = document.getElementById('editQOrder').value || 1;
    const options = Array.from(document.querySelectorAll('#optionsList .option-row input'))
      .map(i => i.value.trim()).filter(Boolean);

    if (!text) { showMsg('msgQ', 'El texto es obligatorio', 'err'); return; }
    if ((type === 'radio' || type === 'checkbox') && !options.length) { showMsg('msgQ', 'Añade al menos una opción', 'err'); return; }

    const method = id ? 'PUT' : 'POST';
    const url = id ? `${API}/admin/questions/${id}` : `${API}/admin/surveys/${currentSurvey.id}/questions`;
    const res = await fetch(url, {
      method, headers: authH(),
      body: JSON.stringify({ text, type, options, category, order_num: parseInt(order_num) })
    });
    const data = await res.json();
    if (!res.ok) { showMsg('msgQ', data.error, 'err'); return; }
    showMsg('msgQ', '✅ Pregunta guardada', 'ok');
    setTimeout(() => { closeQModal(); selectSurvey(currentSurvey.id); }, 600);
  }

  async function deleteQuestion(id) {
    if (!confirm('¿Eliminar esta pregunta?')) return;
    const res = await fetch(`${API}/admin/questions/${id}`, { method: 'DELETE', headers: authH() });
    if (res.ok) {
      showMsg('msgQList', '🗑 Pregunta eliminada', 'ok');
      selectSurvey(currentSurvey.id);
    }
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.className = `msg ${type ? 'msg-' + type + ' show' : ''}`;
  }

  // ── Init ──
  (async () => {
    await checkAuth();
    loadSurveys();
  })();
</script>
</body>
</html>
